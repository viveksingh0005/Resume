version: "3.8"

services:
  backend:
    build: ./server
    restart: always
    environment:
      - MONGO_URI=${MONGO_URI}
      - PORT=3000
    expose:
      - "3000"

  frontend:
    build: ./client
    restart: always
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend